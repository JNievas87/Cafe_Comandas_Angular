<div class="list-group">
  @for (mesa of mesas; track mesa) {
    <button
      type="button"
      class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
      (click)="seleccionar(mesa)">
      Mesa {{ mesa }}
      @if (comandaDeMesa(mesa); as comanda) {
        <span
          class="badge"
          [class.text-bg-warning]="comanda.estado === 'pendiente'"
          [class.text-bg-success]="comanda.estado === 'entregada'">
          {{ comanda.estado }}
        </span>
      } @else {
        <span class="badge text-bg-light text-muted">libre</span>
      }
    </button>
  }
</div>
